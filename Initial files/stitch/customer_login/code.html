<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nabaa Al-Mawaheb - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a247f",
                        "accent": "#ff9800",
                        "background-light": "#f8f9fa",
                        "background-dark": "#121420",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="bg-primary text-white p-6 rounded-b-xl shadow-lg flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-3xl">sports_soccer</span>
<h1 class="text-xl font-bold tracking-tight">Nabaa Al-Mawaheb</h1>
</div>
<div class="material-symbols-outlined text-2xl opacity-80 cursor-pointer">info</div>
</header>
<main class="flex-1 flex flex-col max-w-md mx-auto w-full px-6 pt-12 pb-8">
<!-- Welcome Message -->
<div class="text-center mb-10">
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold mb-2 leading-tight">Welcome Back</h2>
<p class="text-slate-600 dark:text-slate-400 text-lg">Enter your phone number to start your stadium booking</p>
</div>
<!-- Phone Input Field -->
<div class="space-y-6 flex-1">
<div class="relative">
<label class="block text-primary dark:text-slate-300 text-sm font-semibold uppercase tracking-wider mb-2 ml-1">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<span class="text-slate-400 font-medium">+966</span>
</div>
<input class="w-full bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-xl py-5 pl-16 pr-5 text-2xl font-bold text-slate-900 dark:text-white focus:border-primary focus:ring-0 transition-all duration-300 placeholder:text-slate-300 dark:placeholder:text-slate-600" maxlength="9" placeholder="5X XXX XXXX" type="tel"/>
</div>
</div>
<!-- Numeric Keypad Layout Concept (Visual Only) -->
<div class="grid grid-cols-3 gap-4 pt-4">
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">1</button>
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">2</button>
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">3</button>
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">4</button>
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">5</button>
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">6</button>
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">7</button>
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">8</button>
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">9</button>
<div class="h-16"></div>
<button class="bg-white dark:bg-slate-800 h-16 rounded-xl text-2xl font-semibold text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">0</button>
<button class="bg-slate-100 dark:bg-slate-700 h-16 rounded-xl flex items-center justify-center text-slate-700 dark:text-slate-200 shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="mt-12">
<button class="w-full bg-accent hover:bg-[#e68a00] text-white py-6 rounded-2xl text-xl font-black tracking-widest shadow-xl shadow-accent/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                CONTINUE
                <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
</main>
<!-- Footer decoration -->
<footer class="p-8 text-center text-slate-400 dark:text-slate-600 text-sm">
<p>© 2024 Nabaa Al-Mawaheb Sports Stadiums</p>
</footer>
</body></html>
